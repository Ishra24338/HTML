<!DOCTYPE html>
<html>

<head>
  <title>🧙 The Grand Spell Book</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #f5ead6;
      font-family: "Georgia", serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .spell-book {
      background-color: #fdf6e3;
      border: 4px solid #5c3d1e;
      border-radius: 12px;
      width: 580px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    hr {
      border: none;
      border-top: 2px dashed #5c3d1e;
      width: 100%;
    }

    ul.ingredients {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .book-title {
      font-size: 40px;
      font-family: serif;
      font-weight: bold;
      color: rgb(0, 47, 148);

    }

    .spell-name {
      font-size: 26px;
      font-style: italic;
      font-weight: bold;
      color: rgb(0, 109, 0);
    }

    .ingredients {
      font-size: 20px;
      color: rgb(16, 107, 192);
      font-style:italic ;
      line-height: 1;
    }
  </style>
</head>

<body>
  <div class="spell-book">

    <p class="book-title">📖 The Grand Spell Book</p>
    <hr>

    <p class="spell-name">✨ Spell of Infinite Wisdom ✨</p>
    <hr>

    <ul class="ingredients">
      <li>🌿 3 leaves of Moonwhisper Fern</li>
      <li>💧 2 drops of Dragon Tear Water</li>
      <li>🍄 1 Silver Starshroom (crushed)</li>
      <li>🌙 A pinch of Midnight Dust</li>
    </ul>

  </div>
</body>

</html>
